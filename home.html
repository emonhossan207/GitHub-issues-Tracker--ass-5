<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GitHub Issues Tracker — Home</title>
    <link rel="stylesheet" href="style/style.css">
    <!-- logo -->
     <link rel="shortcut icon" href="Image/github-logo.png" type="./Image">
    <!-- font awesome cnd -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <!-- google font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">
    <!-- Tailwind CSS & DaisyUI -->
     <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
      <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-gray-100 h-screen">

        <!-- NAVBAR -->
    <nav class="bg-white shadow-sm border-gray-200 ">
        <div class="flex flex-wrap justify-between items-center px-4 py-3 gap-3">
            <div class="flex items-center gap-4">
               <img class="w-12" src="Image/github-logo.png" alt="">
                <h1 class="text-lg sm:text-2xl font-bold text-[#1F2937]">GitHub Issues Tracker</h1>
            </div>
            <div class="flex items-center gap-2 w-full sm:w-auto ">
                <label class="input input-bordered flex items-center gap-2 bg-white">
                    <i class="fa-solid fa-magnifying-glass text-gray-400 text-sm"></i>
                    <input id="search-input" type="search" placeholder="Search issues..." class="grow w-full sm:w-48" />
                </label>
                <button id="search-btn" class="btn btn-primary btn-sm sm:btn-md whitespace-nowrap">+ New Issue</button>
                
            </div>
        </div>
    </nav>
     <main class="w-11/12 max-w-7xl  mx-auto mt-7 pb-12">

        <!-- Filter Buttons -->
        <section class="bg-white border border-gray-200 rounded-[8px] px-4 py-3 mb-5 flex gap-2">
        <button onclick="filterCards(this,'all')" class="filter-btn btn btn-primary btn-sm flex-1 sm:flex-none sm:w-18">All</button>
        <button onclick="filterCards(this,'open')" class="filter-btn btn btn-outline btn-primary btn-sm flex-1 sm:flex-none sm:w-18">Open</button>
        <button onclick="filterCards(this,'closed')" class="filter-btn btn btn-outline btn-primary btn-sm flex-1 sm:flex-none sm:w-18">Closed</button>
        </section>

        <!-- Stats Bar -->
        <section class="bg-white border  border-gray-200 rounded-[8px] flex justify-between items-center px-4 py-4 mb-4">
            <div class="flex items-center  gap-4">
                <div class="w-11 h-11 bg-violet-100 rounded-full flex items-center justify-center">
                    <img class="w-8" src="Image/Aperture.png" alt="">
                </div>
                <div>
                    <h2 class="text-lg font-bold text-[#1F2937]"><span id="card-count">0</span> Issues</h2>
                    <p class="text-sm text-gray-500">Track and manage your project issues</p>
                </div>
            </div>
            <div class="flex gap-5">
                <p class="flex items-center gap-2 text-sm font-semibold text-gray-700">
                    <span class=" w-3 h-3 rounded-full" style="background:#00A96E;"></span> Open
                </p>
                <p class="flex items-center gap-2 text-sm font-semibold text-gray-700">
                    <span class=" w-3 h-3 rounded-full" style="background:#A855F7;"></span> Closed
                </p>
            </div>
        </section>

        <!-- Loading Spinner -->
        <div id="loding" class="hidden justify-center items-center h-64">
            <span class="loading loading-spinner loading-lg text-primary"></span>
        </div>

        <!-- Error Banner -->
        <div id="error-banner" class="hidden bg-red-50 border border-red-200 text-red-600 rounded-xl px-5 py-3 mb-5 text-sm">
            <i class="fa-solid fa-triangle-exclamation mr-2"></i>
            Failed to load issues. Check your connection.
            <button onclick="allCardFetch()" class="ml-3 btn btn-error btn-xs text-white">Retry</button>
        </div>

        <!-- Card Container -->
        <section id="card-containar" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4">
        </section>

    </main>

    <!-- DaisyUI Modal -->
    <dialog id="issue-modal" class="modal modal-bottom sm:modal-middle">
    <div class="modal-box max-w-lg">
        <div id="modal-body" class="space-y-4">
        </div>
        <div class="modal-action">
            <form method="dialog">
                <button class="btn btn-outline btn-primary w-full sm:w-auto">Close</button>
            </form>
        </div>
    </div>
    <form method="dialog" class="modal-backdrop">
        <button>close</button>
    </form>
</dialog>

    

     <script src="script/script.js"></script>
</body>
</html>
