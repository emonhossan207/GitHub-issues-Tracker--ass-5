<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub issues Tracker Login</title>
    <!-- logo -->
     <link rel="shortcut icon" href="Image/github-logo.png" type="./Image">
    <!-- font awesome cnd -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <!-- google font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">
    <!-- Tailwind CSS & DaisyUI -->
     <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
      <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>


</head>
<body class="bg-gray-200 flex items-center justify-center h-screen">

    <div class="bg-white w-[380px] p-8 rounded-xl shadow-lg text-center">

        <img class="w-16 mx-auto mb-5" src="Image/github-logo.png" alt="">
        <h1 class="text-[24px] font-bold text-[#1F2937] ">Github Issues Tracker</h1>
        <p class=" text-[#1F2937] mb-4">Sign in to manage your issues</p>
        <!-- username -->
        <div class="text-left mb-3">
            <label class="font-medium ">Username</label>
            <input class="w-full  p-2 rounded border border-gray-600/50" type="text" name="" id="username" placeholder="Enter username">
            <p class="text-xs text-purple-600">
                Default: admin
            </p>
            <!-- password -->
        </div>
        <div class="text-left mb-4">
            <label class="font-medium">Password</label>
            <input class="w-full  p-2 rounded border border-gray-600/50" type="password" name="" id="password" placeholder="Enter Password">
            <p class="text-xs text-purple-600">
                Default: admin123
            </p>
        <p id="error-msg" class="text-red-500 text-sm mt-2 hidden">
        Invalid Username or Password
        </p>
        </div>

        <!-- button -->
    <button id="sign-in-button"
    class="w-full py-2 text-white rounded bg-gradient-to-r from-purple-600 to-indigo-600 hover:opacity-90">
     Sign In
    </button>
        
    

    <!-- or -->
    <div class="flex items-center mb-4 mt-4">
    <div class="flex-1 border-t border-gray-500/50"></div>
    <span class="px-4 text-gray-400">OR</span>
    <div class="flex-1 border-t border-gray-500/50 mb"></div>
    </div>
    
    <!-- login password -->
    <div class="bg-gray-200 shadow-sm p-3 rounded text-sm">
    <p><b>Username:</b> admin</p>
    <p><b>Password:</b> admin123</p>
    </div>

    </div>
    
    <script src="script/sign-up.js"></script>
</body>
</html>
